# PyAV stream parameters

stream:
  parameters:
    bit_rate:
      label: "Target Bitrate"
      type: "integer"
      min: 0
      max: 2000000000
      default: 1000000
      suffix: "bps"
      help: "The average bitrate to aim for."

    bit_rate_tolerance:
      label: "Bitrate Tolerance"
      type: "integer"
      min: 0
      max: 1000000000
      default: 4000000
      help: "Number of bits the bitrate is allowed to deviate from the target."

    gop_size:
      label: "GOP Size"
      type: "integer"
      min: -1
      max: 1000
      default: 12
      help: "Distance between I-frames (Group of Pictures)."

    max_b_frames:
      label: "Max B-Frames"
      type: "integer"
      min: 0
      max: 16
      default: 0
      help: "Maximum number of B-frames between non-B-frames."

    thread_count:
      label: "Thread Count"
      type: "integer"
      min: 0
      max: 64
      default: 0
      help: "Number of threads to use (0 for auto)."

    qmin:
      label: "Min Quantizer"
      type: "integer"
      min: 0
      max: 69
      default: 2
      help: "Minimum quantizer (lower is higher quality)."

    qmax:
      label: "Max Quantizer"
      type: "integer"
      min: 0
      max: 69
      default: 31
      help: "Maximum quantizer."

    max_qdiff:
      label: "Max Quantizer Diff"
      type: "integer"
      min: 0
      max: 31
      default: 3
      help: "Maximum difference between quantizers."

    me_method:
      label: "Motion Estimation"
      type: "enum"
      options:
        'zero': { sdesc: 'Zero', ldesc: 'Zero motion estimation' }
        'full': { sdesc: 'Full', ldesc: 'Full search' }
        'log': { sdesc: 'Log', ldesc: 'Logarithmic search' }
        'phods': { sdesc: 'Phods', ldesc: 'Parallel Hierarchical One-Dimensional Search' }
        'epzs': { sdesc: 'EPZS', ldesc: 'Enhanced Predictive Zonal Search' }
        'x1': { sdesc: 'X1', ldesc: 'X1 search' }
        'hex': { sdesc: 'Hex', ldesc: 'Hexagonal search' }
        'umh': { sdesc: 'UMH', ldesc: 'Uneven Multi-Hexagon search' }
      help: "The motion estimation algorithm to use."

    flags:
      label: "Global Flags"
      type: "flags"
      options:
        '4mv': { sdesc: '4MV', ldesc: 'Use 4 motion vectors per macroblock' }
        'qpel': { sdesc: 'QPEL', ldesc: 'Use 1/4 pel motion compensation' }
        'loop': { sdesc: 'Loop Filter', ldesc: 'Use loop filter' }
        'gray': { sdesc: 'Grayscale', ldesc: 'Only decode/encode grayscale' }
        'psnr': { sdesc: 'PSNR', ldesc: 'Calculate PSNR of compressed frames' }
        'low_delay': { sdesc: 'Low Delay', ldesc: 'Force low delay' }

    ticks_per_frame:
      label: "Ticks per Frame"
      type: "integer"
      min: 1
      max: 1000
      default: 1
      help: "Required for some codecs to handle timing correctly."

